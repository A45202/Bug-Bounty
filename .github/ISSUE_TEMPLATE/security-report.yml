name: Security Report
description: Report a security finding (for personal tracking / responsible disclosure)
title: "[SECURITY] "
labels: ["security-report"]

body:
  - type: input
    id: target
    attributes:
      label: Target URL
      placeholder: https://example.com
    validations:
      required: true

  - type: input
    id: org
    attributes:
      label: Organization
      placeholder: Government / Company name
    validations:
      required: true

  - type: dropdown
    id: vuln
    attributes:
      label: Vulnerability Type
      options:
        - Broken Link Hijacking (BLH)
        - XSS
        - IDOR
        - Misconfiguration
        - Other
    validations:
      required: true

  - type: dropdown
    id: social
    attributes:
      label: Social Media Affected
      options:
        - Instagram
        - Twitter / X
        - Facebook
        - None
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: textarea
    id: desc
    attributes:
      label: Description
      placeholder: Explain what you found
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to website
        2. Click social media link
        3. Observe issue
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      placeholder: What could happen if exploited?
    validations:
      required: true

  - type: input
    id: status
    attributes:
      label: Status
      placeholder: Fixed / Unresolved / Reported
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: Additional info
