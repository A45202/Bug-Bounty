name: Auto Full Security Report Generator

on:
  issues:
    types: [opened]

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create reports folder if not exists
        run: mkdir -p reports

      - name: Generate filename
        id: filename
        run: |
          echo "file=reports/${{ github.event.issue.title | toLowerCase | replace(' ', '-') }}.md" >> $GITHUB_OUTPUT

      - name: Create full markdown report
        run: |
          cat <<EOF > ${{ steps.filename.outputs.file }}
# ${{ github.event.issue.title }}

## Target
Not specified in automation (check issue)

## Description
${{ github.event.issue.body }}

---

## Metadata
- Issue URL: ${{ github.event.issue.html_url }}
- Author: ${{ github.event.issue.user.login }}

---

## Status
Reported (auto-generated from GitHub Issue)

EOF

      - name: Update tracker
        run: |
          echo "- [ ] ${{ github.event.issue.title }} | ${{ github.event.issue.html_url }}" >> report-status.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports report-status.md
          git commit -m "Auto generate security report"
          git push
