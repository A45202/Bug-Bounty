name: Security Report
description: Submit a security finding
title: "[SECURITY] "
labels: ["security"]

body:
  - type: input
    id: target
    attributes:
      label: Target URL
    validations:
      required: true

  - type: input
    id: org
    attributes:
      label: Organization
    validations:
      required: true

  - type: dropdown
    id: vuln
    attributes:
      label: Vulnerability Type
      options:
        - Broken Link Hijacking (BLH)
        - XSS
        - IDOR
        - Misconfiguration
        - Open Redirect

  - type: textarea
    id: desc
    attributes:
      label: Description

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce

  - type: textarea
    id: impact
    attributes:
      label: Impact

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
